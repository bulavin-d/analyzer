<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN AI ANALYZER v2.0 PRO</title>
    <meta name="description"
        content="Профессиональный анализатор вокала. Сравни свой вокал с референсом и получи точные рекомендации по сведению.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-orb">
                    <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
                        <rect x="1" y="8" width="2.5" height="6" rx="1.25" fill="#fff" opacity="0.5" />
                        <rect x="5" y="5" width="2.5" height="12" rx="1.25" fill="#fff" opacity="0.7" />
                        <rect x="9" y="2" width="2.5" height="18" rx="1.25" fill="#fff" />
                        <rect x="13" y="5" width="2.5" height="12" rx="1.25" fill="#fff" opacity="0.7" />
                        <rect x="17" y="8" width="2.5" height="6" rx="1.25" fill="#fff" opacity="0.5" />
                    </svg>
                </div>
                <span class="logo-text">Bulavin<span class="logo-ai">AI</span></span>
            </div>
            <div class="header-right">
                <span class="header-ver">v2.0 PRO</span>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="page-title-row">
            <h1 class="page-title">Vocal Analyzer</h1>
        </div>

        <section class="upload-section">
            <!--
                .drops-vertical is position:relative so the scanner beam and
                scanner overlay can be positioned absolutely inside it.
            -->
            <div class="drops-vertical" id="dropsWrap">
                <!-- Scanner overlay — lives on top of BOTH drops during scanning -->
                <div class="drop-scanner-overlay" id="scannerOverlay" style="display:none">
                    <div class="scanner-beam"></div>
                </div>

                <!-- DROP: Референс -->
                <div class="drop-zone drop-ref" id="dropRef" onclick="document.getElementById('fileRef').click()">
                    <!-- Idle sinusoid placeholder (drawn in JS) -->
                    <canvas class="drop-idle-canvas" id="idleCanvasRef"></canvas>
                    <!-- Default content -->
                    <div class="drop-content" id="dropRefContent">
                        <div class="drop-icon drop-icon-ref">
                            <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
                                <path d="M14 4v16M9 14l5 6 5-6" stroke="#E024B6" stroke-width="1.5"
                                    stroke-linecap="round" />
                                <path d="M5 20v3a2 2 0 002 2h14a2 2 0 002-2v-3" stroke="#E024B6" stroke-width="1.5"
                                    stroke-linecap="round" />
                            </svg>
                        </div>
                        <div>
                            <div class="drop-label">Референс</div>
                            <div class="drop-sub">Вокал который нравится · WAV / MP3 / FLAC</div>
                        </div>
                    </div>
                    <!-- Loaded state (waveform) -->
                    <div class="drop-loaded" id="loadedRef" style="display:none">
                        <canvas class="wave-mini" id="waveMiniRef"></canvas>
                        <div class="loaded-info">
                            <div class="loaded-name" id="nameRef"></div>
                            <div class="loaded-meta" id="metaRef"></div>
                        </div>
                    </div>
                    <input type="file" id="fileRef" accept=".wav,.mp3,.flac,.ogg,.m4a,.aac" hidden>
                </div>

                <!-- Pulse divider -->
                <div class="pulse-divider">
                    <div class="pulse-line">
                        <div class="pulse-glow"></div>
                    </div>
                    <div class="pulse-arrow">↓</div>
                </div>

                <!-- DROP: Твой вокал -->
                <div class="drop-zone drop-mine" id="dropMine" onclick="document.getElementById('fileMine').click()">
                    <canvas class="drop-idle-canvas" id="idleCanvasMine"></canvas>
                    <div class="drop-content" id="dropMineContent">
                        <div class="drop-icon drop-icon-mine">
                            <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
                                <path d="M14 4v16M9 14l5 6 5-6" stroke="#7000FF" stroke-width="1.5"
                                    stroke-linecap="round" />
                                <path d="M5 20v3a2 2 0 002 2h14a2 2 0 002-2v-3" stroke="#7000FF" stroke-width="1.5"
                                    stroke-linecap="round" />
                            </svg>
                        </div>
                        <div>
                            <div class="drop-label">Твой вокал</div>
                            <div class="drop-sub">Сухая или обработанная запись · WAV / MP3 / FLAC</div>
                        </div>
                    </div>
                    <div class="drop-loaded" id="loadedMine" style="display:none">
                        <canvas class="wave-mini" id="waveMiniMine"></canvas>
                        <div class="loaded-info">
                            <div class="loaded-name" id="nameMine"></div>
                            <div class="loaded-meta" id="metaMine"></div>
                        </div>
                    </div>
                    <input type="file" id="fileMine" accept=".wav,.mp3,.flac,.ogg,.m4a,.aac" hidden>
                </div>
            </div>

            <div class="analyze-wrap">
                <button class="analyze-btn" id="btnAnalyze" disabled>
                    <span class="btn-text">Загрузи оба файла</span>
                </button>
            </div>

            <!-- Scan progress: NO grey box — just steps on clean bg -->
            <div class="scan-progress" id="progress" style="display:none">
                <div class="scan-bar-wrap">
                    <div class="scan-bar-fill" id="scanBarFill"></div>
                </div>
                <div class="scan-steps" id="scanSteps"></div>
            </div>
        </section>

        <div id="results"></div>
    </main>

    <footer class="footer">
        BULAVIN AI ANALYZER v2.0 PRO · All rights reserved © 2026 · Powered by BULAVIN
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="js/dsp.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
